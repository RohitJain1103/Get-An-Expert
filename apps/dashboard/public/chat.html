<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Get An Expert | Chat</title>
  <style>
    /* Standalone page: palette copied from the dashboard theme on purpose,
       do not link styles.css. */
    :root {
      --bg: #0A0A0E;
      --surface: #131318;
      --raised: #1C1C24;
      --border: #282830;
      --text: #E4E4EC;
      --text2: #90909B;
      --text3: #585860;
      --amber: #F5A623;
      --amber-soft: rgba(245, 166, 35, 0.12);
      --green: #22C55E;
      --red: #EF4444;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }

    .topbar {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .topbar .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .topbar .logo span { color: var(--amber); }
    .conn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
    }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
    .conn-dot.online { background: var(--green); }
    .conn-dot.error { background: var(--red); }

    .banner {
      padding: 9px 16px;
      font-size: 12.5px;
      line-height: 1.5;
      background: var(--amber-soft);
      color: var(--amber);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .banner.ok { background: rgba(34, 197, 94, 0.1); color: var(--green); }
    .banner.bad { background: rgba(239, 68, 68, 0.1); color: var(--red); }
    .banner.muted { background: var(--surface); color: var(--text2); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .msg { max-width: 82%; display: flex; flex-direction: column; }
    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.theirs { align-self: flex-start; align-items: flex-start; }
    .msg .meta {
      font-size: 10.5px;
      color: var(--text3);
      margin-bottom: 3px;
      padding: 0 4px;
      display: flex;
      gap: 6px;
    }
    .msg .meta .who { font-weight: 600; color: var(--text2); }
    .msg .bubble {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.mine .bubble {
      background: var(--amber);
      color: #000;
      border-bottom-right-radius: 4px;
    }
    .msg.theirs .bubble {
      background: var(--raised);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.activity {
      max-width: 100%;
      align-self: stretch;
      flex-direction: row;
      align-items: baseline;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
      padding: 1px 2px;
    }
    .msg.activity .act-dot { color: var(--amber); flex-shrink: 0; }
    .msg.activity .act-text { flex: 1; word-break: break-word; }
    .msg.activity .act-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }
    .messages .empty {
      margin: auto;
      text-align: center;
      color: var(--text3);
      font-size: 12.5px;
      line-height: 1.6;
      max-width: 260px;
    }

    .composer {
      display: flex;
      gap: 8px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .composer input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 16px; /* >=16px stops iOS zoom-on-focus */
      font-family: var(--sans);
    }
    .composer input:focus { outline: none; border-color: var(--amber); }
    .composer input:disabled { opacity: 0.5; }
    .composer button {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--amber);
      background: var(--amber);
      color: #000;
      font-family: var(--sans);
      flex-shrink: 0;
    }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

    .fatal {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .fatal-card {
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px;
      text-align: center;
    }
    .fatal-card h1 { font-size: 16px; margin-bottom: 8px; }
    .fatal-card p { font-size: 13px; color: var(--text2); line-height: 1.55; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">Get An <span>Expert</span></div>
    <div class="conn">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Connecting&hellip;</span>
    </div>
  </header>

  <div class="banner hidden" id="banner"></div>

  <main class="messages" id="messages">
    <div class="empty" id="empty">No messages yet. Say hello &mdash; your messages are delivered to the expert working on your machine.</div>
  </main>

  <form class="composer" id="composer">
    <input
      type="text"
      id="input"
      maxlength="2000"
      placeholder="Type a message"
      autocomplete="off"
      aria-label="Chat message"
    >
    <button type="submit" id="send">Send</button>
  </form>

  <div class="fatal hidden" id="fatal">
    <div class="fatal-card">
      <h1 id="fatal-title">Chat unavailable</h1>
      <p id="fatal-text"></p>
    </div>
  </div>

  <script src="chat-core.js"></script>
  <script src="chat.js"></script>
</body>
</html>
